<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handbal4RO - Înregistrare</title>

    <link rel="icon" type="image" href="images/handball4ro.jpeg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container justify-content-center justify-content-lg-between">
            <a class="navbar-brand fw-bold" href="home.html">Handball&#x34;&#xFE0F;&#x20E3;RO</a>
            <a href="home.html" class="btn btn-outline-light btn-sm d-none d-lg-block">Înapoi la site</a>
        </div>
    </nav>
    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-white border-bottom-0 text-center pt-4 pb-0">
                        <h3 class="fw-bold text-primary">Creează un cont nou</h3>
                        <p class="text-muted">Alătură-te comunității de handbal din România!</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="login.html" method="GET">

                            <div class="mb-3">
                                <label for="numeComplet" class="form-label fw-bold">Nume și Prenume</label>
                                <input type="text" class="form-control" id="numeComplet" placeholder="Ex: Andrei Popa"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="adresaEmail" class="form-label fw-bold">Adresă de Email</label>
                                <input type="email" class="form-control" id="adresaEmail" placeholder="nume@exemplu.ro"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="parolaCont" class="form-label fw-bold">Parolă</label>
                                <input type="password" class="form-control" id="parolaCont"
                                    placeholder="Minim 8 caractere" required>
                            </div>

                            <div class="mb-3">
                                <label for="confirmaParola" class="form-label fw-bold">Confirmă Parola</label>
                                <input type="password" class="form-control" id="confirmaParola" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Sunt interesat ca:</label>
                                <select class="form-select">
                                    <option value="fan" selected>Suporter / Fan</option>
                                    <option value="jucator">Jucător / Sportiv</option>
                                    <option value="antrenor">Antrenor / Oficial</option>
                                </select>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg fw-bold">Înregistrează-te</button>
                            </div>

                        </form>
                    </div>
                    <div class="card-footer bg-light text-center py-3 border-top-0">
                        <span class="text-muted">Ai deja un cont?</span>
                        <a href="login.html" class="fw-bold text-decoration-none text-primary">Autentifică-te aici</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
